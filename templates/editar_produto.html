{% extends "base.html" %}

{% block content %}

<div class="container">

    <h1 class="mb-4">Editar Produto</h1>

    <form method="POST">

        <div class="mb-3">
            <label class="form-label">Nome do Produto</label>
            <input
                type="text"
                name="nome"
                class="form-control"
                value="{{ produto['nome'] }}"
                placeholder="Digite o nome do produto"
                required>
        </div>

        <div class="mb-3">
            <label class="form-label">Código</label>
            <input
                type="text"
                name="codigo"
                class="form-control"
                value="{{ produto['codigo'] }}"
                placeholder="Ex: P001">
        </div>

        <div class="mb-3">
            <label class="form-label">Categoria</label>
            <input
                type="text"
                name="categoria"
                class="form-control"
                value="{{ produto['categoria'] }}"
                placeholder="Ex: Informática">
        </div>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Preço de Compra (R$)</label>
                <input
                    type="number"
                    name="preco_compra"
                    step="0.01"
                    min="0"
                    class="form-control"
                    value="{{ produto['preco_compra'] }}"
                    required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Preço de Venda (R$)</label>
                <input
                    type="number"
                    name="preco_venda"
                    step="0.01"
                    min="0"
                    class="form-control"
                    value="{{ produto['preco_venda'] }}"
                    required>
            </div>

        </div>

        <div class="row">

            <div class="col-md-6 mb-3">
                <label class="form-label">Estoque Atual</label>
                <input
                    type="number"
                    name="estoque"
                    min="0"
                    class="form-control"
                    value="{{ produto['estoque'] }}"
                    required>
            </div>

            <div class="col-md-6 mb-3">
                <label class="form-label">Estoque Mínimo</label>
                <input
                    type="number"
                    name="estoque_minimo"
                    min="0"
                    class="form-control"
                    value="{{ produto['estoque_minimo'] }}"
                    required>
            </div>

        </div>

        <div class="d-flex gap-2">

            <button type="submit" class="btn btn-success">
                Salvar Alterações
            </button>

            <a href="/produtos" class="btn btn-secondary">
                Cancelar
            </a>

        </div>

    </form>

</div>

{% endblock %}
