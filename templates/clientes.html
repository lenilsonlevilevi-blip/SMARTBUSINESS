{% extends "base.html" %}

{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">

    <h1>Clientes</h1>

    <a href="/clientes/novo" class="btn btn-primary">
    + Novo Cliente
    </a>
</div>

<table class="table table-striped table-hover">

    <thead>

        <tr>

            <th>Nome</th>
            <th>Telefone</th>
            <th>E-mail</th>
            <th>Cidade</th>
            <th>Ações</th>

        </tr>

    </thead>

   <tbody>

{% for cliente in clientes %}

<tr>

   <td>{{ cliente["nome"] }}</td>
    <td>{{ cliente["telefone"] }}</td>
    <td>{{ cliente["email"] }}</td>
    <td>{{ cliente["cidade"] }}</td>

    <td>
        <a href="/clientes/editar/{{ cliente['id'] }}" class="btn btn-sm btn-primary">
            Editar
        </a>
   </td>

</tr>

{% endfor %}

</tbody>

</table>

{% endblock %}
